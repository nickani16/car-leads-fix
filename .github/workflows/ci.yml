name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: local-ci-placeholder
      SUPABASE_SECRET_KEY: local-ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: local-ci-placeholder
      STRIPE_SECRET_KEY: sk_test_local_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_local_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
